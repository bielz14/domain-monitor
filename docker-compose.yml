services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: domain-monitor-app
    working_dir: /var/www/html
    env_file: .env.docker
    environment:
      CONTAINER_ROLE: app
    volumes:
      - ./:/var/www/html
      - vendor_data:/var/www/html/vendor
      - build_data:/var/www/html/public/build
    networks:
      - app-network
    depends_on:
      - db
    healthcheck:
      test: [ "CMD-SHELL", "nc -z localhost 9000 || exit 1" ]
      interval: 5s
      timeout: 3s
      retries: 15
      start_period: 60s

  db:
    image: mysql:8.0
    container_name: domain-monitor-db
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: monitor
      MYSQL_USER: monitor
      MYSQL_PASSWORD: monitor
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql
    networks:
      - app-network

  web:
    image: nginx:alpine
    container_name: domain-monitor-nginx
    ports:
      - "8080:80"
    volumes:
      - ./:/var/www/html:cached
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - build_data:/var/www/html/public/build
    depends_on:
      app:
        condition: service_healthy
    networks:
      - app-network

  queue:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: domain-monitor-queue
    command: php artisan queue:work --tries=3 --timeout=90
    env_file: .env.docker
    environment:
      CONTAINER_ROLE: queue
    volumes:
      - ./:/var/www/html
      - vendor_data:/var/www/html/vendor
    depends_on:
      app:
        condition: service_healthy
      db:
        condition: service_started
    networks:
      - app-network

  scheduler:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: domain-monitor-scheduler
    command: >
      sh -c "while true; do php artisan schedule:run; sleep 60; done"
    env_file: .env.docker
    environment:
      CONTAINER_ROLE: scheduler
    volumes:
      - ./:/var/www/html
      - vendor_data:/var/www/html/vendor
    depends_on:
      app:
        condition: service_healthy
      db:
        condition: service_started
    networks:
      - app-network

  redis:
    image: redis:alpine
    container_name: domain-monitor-redis
    networks:
      - app-network

volumes:
  db_data:
  vendor_data:
  build_data:

networks:
  app-network:
    driver: bridge
